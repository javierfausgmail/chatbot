# docker-compose.local.yml
services:
  postgres:
    image: postgres:16
    container_name: chatbot-postgres16
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
    ports:
      - "5433:5432"
    volumes:
      - chatbot_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: chatbot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    container_name: chatbot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: chatbotminio
      MINIO_ROOT_PASSWORD: chatbotminio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - chatbot_minio:/data

  blender-worker:
    build: ./workers/blender
    container_name: chatbot-blender-worker
    restart: unless-stopped
    environment:
      OUTPUT_ROOT: /outputs
      DEBUGPY: ${BLENDER_DEBUGPY:-0}
      DEBUGPY_WAIT: ${BLENDER_DEBUGPY_WAIT:-0}
    ports:
      - "8010:8010"
      - "5678:5678"
    volumes:
      - ./public/generated-3d:/outputs

volumes:
  chatbot_pgdata:
  chatbot_minio:
